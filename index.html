<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  <style> body { margin: 0; } </style>
  
  <script>
    AFRAME.registerComponent('mindar-camera-fix', {
      tick: function () {
        var cam = this.el.sceneEl.camera;
        if (cam && cam.near !== 0.001) {
          cam.near = 0.001;
          cam.updateProjectionMatrix();
        }
      }
    });
    AFRAME.registerComponent('fix-model-clipping', {
      init: function () {
        this.el.addEventListener('model-loaded', () => {
          const obj = this.el.getObject3D('mesh');
          if (obj) {
            obj.traverse((node) => {
              if (node.isMesh) {
                node.frustumCulled = false;
                if (node.material) {
                  node.material.side = THREE.DoubleSide;
                  node.material.depthWrite = true;
                }
              }
            });
          }
        });
      }
    });
  </script>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; colorManagement: true;"
    mindar-camera-fix>
    
    <a-assets>
      <a-asset-item id="model" src="./model6.glb"></a-asset-item>
    </a-assets>
    
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    
    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        fix-model-clipping
        src="#model"
        position="0 -0.3 0"
        scale="1 1 1"
        rotation="0 0 0"
        animation-mixer="clip: mixamo.com.003 Retarget.001; loop: repeat">
      </a-gltf-model>
    </a-entity>
  </a-scene>
</body>
</html>
